services:
  - type: web
    name: shl-ai-agent
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python scripts/preprocess.py && python scripts/build_index.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: CATALOG_PATH
        value: data/catalog.json
      - key: PROCESSED_CATALOG_PATH
        value: data/processed_catalog.json
      - key: FAISS_INDEX_PATH
        value: data/faiss.index
      - key: INDEX_METADATA_PATH
        value: data/index_metadata.json
